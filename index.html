<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyChords</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f5f5f5; min-height:100vh; }

/* HEADER */
.header { background:white; border-bottom:1px solid #ddd; padding:12px 20px; display:flex; align-items:center; gap:16px; }
.logo { font-size:22px; font-weight:900; color:#111; }
.logo span { font-size:20px; }
.nav-tabs { display:flex; gap:8px; margin-left:auto; }
.nav-tab { padding:6px 16px; border-radius:20px; border:1.5px solid #ddd; background:white; cursor:pointer; font-size:14px; font-weight:600; color:#555; transition:all .2s; }
.nav-tab.active { background:#557799; border-color:#557799; color:white; }

/* BUSCADOR */
.search-section { padding:30px 20px; max-width:800px; margin:0 auto; }
.search-box { display:flex; gap:10px; margin-bottom:20px; }
.search-box input { flex:1; padding:12px 18px; border:2px solid #ddd; border-radius:8px; font-size:16px; outline:none; }
.search-box input:focus { border-color:#557799; }
.btn-buscar { padding:12px 24px; background:#557799; color:white; border:none; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; }
.btn-buscar:hover { background:#446688; }
.status { text-align:center; color:#888; font-size:14px; margin:10px 0; }

/* CANCION */
.cancion { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.cancion-titulo { font-size:26px; font-weight:900; margin-bottom:4px; }
.cancion-meta { color:#888; font-size:14px; margin-bottom:16px; display:flex; gap:16px; }
.seccion { margin-bottom:16px; border-radius:8px; overflow:hidden; border:1px solid #e0e0e0; }
.seccion-label { padding:6px 14px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.compases { display:flex; flex-wrap:wrap; padding:10px; gap:6px; }
.compas { background:white; border:1px solid #ddd; border-radius:6px; padding:8px 12px; min-width:80px; }
.compas-acorde { font-size:20px; font-weight:900; color:#111; }
.compas-letra { font-size:11px; color:#888; margin-top:3px; font-style:italic; }

.sec-estrofa .seccion-label { background:#e8f0e8; color:#446644; }
.sec-estrofa .compases { background:#f5faf5; }
.sec-estribillo .seccion-label { background:#e8e8f8; color:#444488; }
.sec-estribillo .compases { background:#f5f5fc; }
.sec-puente .seccion-label { background:#e8f4f8; color:#336677; }
.sec-puente .compases { background:#f0f8fc; }
.sec-intro .seccion-label { background:#f8f0e8; color:#775533; }
.sec-intro .compases { background:#fdf8f2; }
.sec-outro .seccion-label { background:#f0f0f0; color:#555; }
.sec-outro .compases { background:#fafafa; }

/* BIBLIOTECA */
.bib-section { padding:20px; max-width:1100px; margin:0 auto; }
.bib-controles { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; align-items:center; }
.bib-nota-btns { display:flex; gap:6px; flex-wrap:wrap; }
.btn-nota { padding:6px 12px; border-radius:6px; border:1.5px solid #ddd; background:white; cursor:pointer; font-weight:700; font-size:13px; color:#333; transition:all .2s; }
.btn-nota.active { background:#557799; border-color:#557799; color:white; }
.familia-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.btn-fam { padding:5px 14px; border-radius:16px; border:1.5px solid #ddd; background:white; cursor:pointer; font-size:13px; font-weight:600; color:#555; transition:all .2s; }
.btn-fam.active { color:white; border-color:transparent; }
.btn-fam[data-fam="mayor"].active { background:#2277bb; }
.btn-fam[data-fam="menor"].active { background:#228855; }
.btn-fam[data-fam="dominante"].active { background:#cc4433; }
.btn-fam[data-fam="disminuido"].active { background:#aa8800; }
.btn-fam[data-fam="semidim"].active { background:#cc6600; }
.btn-fam[data-fam="aumentado"].active { background:#7744aa; }
.btn-fam[data-fam="power"].active { background:#333; }

.acordes-grid { display:flex; flex-wrap:wrap; gap:14px; }
.acorde-card { background:white; border-radius:10px; padding:12px 14px; box-shadow:0 2px 6px rgba(0,0,0,.08); cursor:pointer; transition:transform .15s, box-shadow .15s; min-width:110px; text-align:center; }
.acorde-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.14); }
.acorde-nombre { font-size:18px; font-weight:900; color:#111; margin-bottom:8px; }
.acorde-formula { font-size:10px; color:#888; margin-bottom:8px; }

/* DIAGRAMA SVG */
.diagrama-wrap { display:flex; justify-content:center; }

/* MODAL DIAGRAMA */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:14px; padding:24px; max-width:420px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,.2); position:relative; }
.modal-close { position:absolute; top:12px; right:16px; font-size:22px; cursor:pointer; color:#888; border:none; background:none; }
.modal-titulo { font-size:22px; font-weight:900; margin-bottom:4px; }
.modal-formula { font-size:12px; color:#888; margin-bottom:12px; }
.modal-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px; }
.btn-nav { background:#f0f0f0; border:none; border-radius:6px; padding:6px 14px; cursor:pointer; font-size:18px; font-weight:700; }
.btn-nav:hover { background:#e0e0e0; }
.modal-pos { font-size:13px; color:#666; }
.modo-btns { display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
.btn-modo { padding:4px 12px; border-radius:12px; border:1.5px solid #ddd; background:white; cursor:pointer; font-size:12px; font-weight:600; color:#555; }
.btn-modo.active { background:#557799; border-color:#557799; color:white; }
.modal-desc { font-size:12px; color:#555; margin-top:12px; line-height:1.6; border-top:1px solid #eee; padding-top:10px; }
.modal-midi { margin-top:10px; }
.btn-play { background:#557799; color:white; border:none; border-radius:8px; padding:8px 20px; cursor:pointer; font-size:14px; font-weight:700; width:100%; }
.btn-play:hover { background:#446688; }

/* CUERDAS MUDA / AIRE labels */
.cuerda-status { display:flex; justify-content:space-around; margin-bottom:4px; font-size:10px; font-weight:700; color:#888; width:100%; }

.hidden { display:none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎸 <span>OnlyChords</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="mostrarTab('buscar')">🔍 Buscar</button>
    <button class="nav-tab" onclick="mostrarTab('biblioteca')">📚 Biblioteca</button>
  </div>
</div>

<!-- TAB BUSCAR -->
<div id="tab-buscar" class="search-section">
  <div class="search-box">
    <input id="inp" type="text" placeholder="Ej: Yesterday Beatles, Hotel California..." onkeydown="if(event.key==='Enter')buscar()">
    <button class="btn-buscar" onclick="buscar()">Buscar</button>
  </div>
  <div id="status" class="status"></div>
  <div id="resultado"></div>
</div>

<!-- TAB BIBLIOTECA -->
<div id="tab-biblioteca" class="bib-section hidden">
  <div class="bib-controles">
    <strong style="font-size:13px;color:#555;">Nota raíz:</strong>
    <div class="bib-nota-btns" id="nota-btns"></div>
  </div>
  <div class="familia-tabs" id="fam-tabs"></div>
  <div class="subfamilia-tabs" id="subfam-tabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;"></div>
  <div class="acordes-grid" id="acordes-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-titulo" id="m-titulo"></div>
    <div class="modal-formula" id="m-formula"></div>
    <div class="modo-btns">
      <button class="btn-modo active" onclick="setModo('intervalos')">Intervalos</button>
      <button class="btn-modo" onclick="setModo('notas')">Notas</button>
      <button class="btn-modo" onclick="setModo('dedos')">Dedos</button>
    </div>
    <div class="modal-nav">
      <button class="btn-nav" onclick="navPos(-1)">◀</button>
      <span class="modal-pos" id="m-pos"></span>
      <button class="btn-nav" onclick="navPos(1)">▶</button>
    </div>
    <div class="cuerda-status" id="m-cuerdas-status"></div>
    <div class="diagrama-wrap" id="m-diagrama"></div>
    <div class="modal-midi">
      <button class="btn-play" onclick="playAcorde()">▶ Escuchar acorde</button>
    </div>
    <div class="modal-desc" id="m-desc"></div>
  </div>
</div>

<script>
// ─── DATOS ────────────────────────────────────────────────
const NOTAS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const NOTAS_DISPLAY = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const AFINACION = [4,9,2,7,11,4]; // E2 A2 D3 G3 B3 E4 en índices (MIDI base 40,45,50,55,59,64)
const MIDI_BASE = [40,45,50,55,59,64]; // E2 A2 D3 G3 B3 E4

// 7 familias con sufijos del JSON mapeados
const FAMILIAS = [
  { id:'mayor', label:'Mayor 🔵', color:'#2277bb', sufijos:['major','maj7','maj9','6','69','add9','sus2','sus4','maj7#11'] },
  { id:'menor', label:'Menor 🟢', color:'#228855', sufijos:['minor','m7','m9','m6','madd9','msus2','msus4','mmaj7','m11','m13'] },
  { id:'dominante', label:'Dominante 🔴', color:'#cc4433', sufijos:['7','9','11','13','7sus4','7b5','7#5','7b9','7#9','9b5','13b9','13#9','7alt'] },
  { id:'disminuido', label:'Disminuido 🟡', color:'#aa8800', sufijos:['dim','dim7','aug7','augmaj7'] },
  { id:'semidim', label:'Semidism. 🟠', color:'#cc6600', sufijos:['m7b5','m9b5'] },
  { id:'aumentado', label:'Aumentado 🟣', color:'#7744aa', sufijos:['aug'] },
  { id:'power', label:'Power 🎸', color:'#333', sufijos:['5'] }
];

// Intervalos desde raíz
const ITVS = ['T','b2','2','b3','3M','4','b5','5','b6','6','7m','7M'];
const FORMULA_MAP = {
  'major':'1-3M-5', 'minor':'1-3m-5', '7':'1-3M-5-7m', 'm7':'1-3m-5-7m',
  'maj7':'1-3M-5-7M', 'm7b5':'1-3m-b5-7m', 'sus2':'1-2-5', 'sus4':'1-4-5',
  'dim':'1-3m-b5', 'dim7':'1-3m-b5-6', 'aug':'1-3M-#5', '5':'1-5',
  '6':'1-3M-5-6', 'm6':'1-3m-5-6', '9':'1-3M-5-7m-9', 'm9':'1-3m-5-7m-9',
  'maj9':'1-3M-5-7M-9', 'add9':'1-3M-5-9', 'madd9':'1-3m-5-9',
  '7b9':'1-3M-5-7m-b9', '7#9':'1-3M-5-7m-#9', '13':'1-3M-5-7m-9-13',
  '7sus4':'1-4-5-7m', 'aug7':'1-3M-#5-7m', 'augmaj7':'1-3M-#5-7M',
  'mmaj7':'1-3m-5-7M', '69':'1-3M-5-6-9', 'm11':'1-3m-5-7m-9-11'
};

const DESCRIPCIONES = {
  'major':'El punto de partida de todo. Tónica, tercera mayor y quinta — la trinidad perfecta.',
  'minor':'La melancolía hecha acorde. Tercera menor que lo oscurece todo. El favorito del flamenco y el blues.',
  '7':'Tensión pura. Quiere resolver al mayor. El rey del blues — de BB King a Stevie Ray Vaughan.',
  'm7':'Oscuro y sofisticado. El ii del jazz. Miles Davis lo usaba como pincel principal.',
  'maj7':'Soñador y flotante. Huele a Ipanema. El favorito de la bossa nova — João Gilberto lo adoraba.',
  'dim7':'Simétrico y perturbador. Se repite cada 3 trastes. Django Reinhardt lo dominaba como nadie.',
  'aug':'Inestable, expansivo. La quinta aumentada crea tensión hacia arriba. Los Beatles lo usaban en momentos dramáticos.',
  '7#9':'El acorde Hendrix. Tiene tercera mayor Y menor simultáneamente — una disonancia salvaje. Purple Haze.',
  'sus2':'Sin tercera, abierto, moderno. El favorito del pop alternativo de los 90. Sting lo usaba constantemente.',
  'sus4':'Suspensión clásica que resuelve al mayor. The Edge de U2 construyó su sonido sobre este acorde.',
  '5':'Solo tónica y quinta — sin tercera. Ni mayor ni menor. El lenguaje universal del rock desde Chuck Berry.',
  'm7b5':'El semidisminuido del jazz. El ii en tonalidad menor. Bill Evans lo amaba.',
  'maj9':'Extensión del maj7, más color. Jazz moderno y bossa sofisticada.',
  '9':'Dominante con novena — más colorido que el 7. El sabor del soul y el R&B.',
  'add9':'Agrega novena sin séptima. Abierto y colorido sin tensión. Pop moderno.',
  '6':'Mayor con sexta — elegante y luminoso. Perfecto para terminar una canción con clase.',
  'dim':'Tríada disminuida — máxima tensión en tres notas. Música clásica y paso cromático.',
  'mmaj7':'Oscuro e inquietante. La séptima mayor sobre menor crea tensión refinada. Jazz noir y tango moderno.'
};

// ─── ESTADO ───────────────────────────────────────────────
let chordDB = null;
let notaActiva = 'C';
let famActiva = 'mayor';
let subfamActiva = null;
let modalAcorde = null; // {key, suffix, posIdx}
let modoCirculo = 'intervalos';

// ─── INIT ─────────────────────────────────────────────────
window.onload = () => {
  renderNotaBtns();
  renderFamTabs();
};

function mostrarTab(tab) {
  document.getElementById('tab-buscar').classList.toggle('hidden', tab !== 'buscar');
  document.getElementById('tab-biblioteca').classList.toggle('hidden', tab !== 'biblioteca');
  document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='buscar')||(i===1&&tab==='biblioteca')));
  if (tab === 'biblioteca' && !chordDB) cargarDB();
}

// ─── CARGAR JSON ──────────────────────────────────────────
async function cargarDB() {
  document.getElementById('acordes-grid').innerHTML = '<p style="color:#888;padding:20px">Cargando biblioteca de acordes...</p>';
  try {
    const r = await fetch('/public/guitar.json');
    if (!r.ok) throw new Error('No se pudo cargar guitar.json');
    const data = await r.json();
    chordDB = data.chords;
    renderAcordes();
  } catch(e) {
    document.getElementById('acordes-grid').innerHTML = `<p style="color:red;padding:20px">Error cargando biblioteca: ${e.message}</p>`;
  }
}

// ─── RENDER CONTROLES ─────────────────────────────────────
function renderNotaBtns() {
  const c = document.getElementById('nota-btns');
  c.innerHTML = NOTAS_DISPLAY.map(n =>
    `<button class="btn-nota${n===notaActiva?' active':''}" onclick="setNota('${n}')">${n}</button>`
  ).join('');
}

function renderFamTabs() {
  const c = document.getElementById('fam-tabs');
  c.innerHTML = FAMILIAS.map(f =>
    `<button class="btn-fam${f.id===famActiva?' active':''}" data-fam="${f.id}" onclick="setFam('${f.id}')">${f.label}</button>`
  ).join('');
}

function setNota(n) { notaActiva = n; renderNotaBtns(); renderAcordes(); }
function setFam(f) { famActiva = f; subfamActiva = null; renderFamTabs(); renderAcordes(); }
function setSubfam(s) { subfamActiva = s; renderSubfamTabs(); renderAcordes(); }

function renderSubfamTabs() {
  const fam = FAMILIAS.find(f => f.id === famActiva);
  if (!fam || !chordDB) return;
  const keyDB = notaActiva.replace('#','sharp');
  const disponibles = (fam.sufijos || []).filter(s => chordDB[keyDB] && chordDB[keyDB][s] && chordDB[keyDB][s].length);
  const c = document.getElementById('subfam-tabs');
  c.innerHTML = disponibles.map(s =>
    `<button class="btn-fam${subfamActiva===s?' active':''}" style="${subfamActiva===s?'background:'+getFamColor()+';color:white;border-color:transparent':''}" onclick="setSubfam('${s}')">${s}</button>`
  ).join('');
}

function getFamColor() {
  return (FAMILIAS.find(f=>f.id===famActiva)||{}).color || '#557799';
}

// ─── RENDER ACORDES ───────────────────────────────────────
function renderAcordes() {
  if (!chordDB) return;
  const fam = FAMILIAS.find(f => f.id === famActiva);
  if (!fam) return;
  const keyDB = notaActiva.replace('#','sharp');
  const chords = chordDB[keyDB] || {};
  const sufijos = subfamActiva ? [subfamActiva] : fam.sufijos;

  renderSubfamTabs();

  const grid = document.getElementById('acordes-grid');
  let html = '';
  for (const suf of sufijos) {
    if (!chords[suf] || !chords[suf].length) continue;
    const nombre = notaActiva + (suf === 'major' ? '' : suf === 'minor' ? 'm' : suf);
    const formula = FORMULA_MAP[suf] || suf;
    const pos = chords[suf][0];
    html += `<div class="acorde-card" onclick="abrirModal('${keyDB}','${suf}',0)">
      <div class="acorde-nombre">${nombre}</div>
      <div class="acorde-formula">${formula}</div>
      <div class="diagrama-wrap">${diagramaSVG(pos, notaActiva, suf, 'intervalos', 52)}</div>
    </div>`;
  }
  grid.innerHTML = html || '<p style="color:#aaa;padding:20px">No hay acordes disponibles para esta combinación.</p>';
}

// ─── DIAGRAMA SVG ─────────────────────────────────────────
function diagramaSVG(pos, notaRaiz, suf, modo, sz) {
  if (!pos) return '';
  const { frets, fingers, baseFret, barres = [] } = pos;
  const midi = pos.midi || [];
  const nStrings = 6, nFrets = 4;
  const cw = sz, rh = sz * 0.42, pad = sz * 0.55, topPad = sz * 0.55;
  const W = pad + (nStrings-1)*cw + pad + sz*0.4;
  const H = topPad + nFrets*rh + pad;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Fondo
  svg += `<rect width="${W}" height="${H}" fill="white" rx="4"/>`;

  // Número de traste base (si > 1)
  const bf = baseFret || 1;
  if (bf > 1) {
    svg += `<text x="${W - sz*0.15}" y="${topPad + rh*0.7}" font-size="${sz*0.28}" fill="#333" font-weight="700" text-anchor="end">${bf}fr</text>`;
  } else {
    // Cejuela
    svg += `<rect x="${pad - sz*0.08}" y="${topPad - rh*0.12}" width="${(nStrings-1)*cw + sz*0.16}" height="${rh*0.2}" fill="#111" rx="2"/>`;
  }

  // Trastes (horizontales)
  for (let f = 0; f <= nFrets; f++) {
    const y = topPad + f*rh;
    svg += `<line x1="${pad}" y1="${y}" x2="${pad+(nStrings-1)*cw}" y2="${y}" stroke="#ccc" stroke-width="${f===0?2:1}"/>`;
    if (f > 0) svg += `<text x="${pad+(nStrings-1)*cw+sz*0.18}" y="${y - rh*0.3}" font-size="${sz*0.22}" fill="#bbb" text-anchor="start">${bf+f-1}</text>`;
  }

  // Cuerdas (verticales)
  for (let s = 0; s < nStrings; s++) {
    svg += `<line x1="${pad+s*cw}" y1="${topPad}" x2="${pad+s*cw}" y2="${topPad+nFrets*rh}" stroke="#999" stroke-width="1.2"/>`;
  }

  // Barras
  for (const b of barres) {
    const y = topPad + (b.fret - 0.5)*rh;
    const x1 = pad + (6 - b.toSting)*cw;
    const x2 = pad + (6 - b.fromString)*cw;
    svg += `<rect x="${x1}" y="${y - rh*0.35}" width="${x2-x1}" height="${rh*0.7}" fill="#ddd" stroke="#666" stroke-width="1" rx="${rh*0.3}"/>`;
  }

  // Marcadores muda / aire encima
  const cx0 = s => pad + (5-s)*cw;
  for (let s = 0; s < nStrings; s++) {
    const f = frets[s];
    if (f === -1) {
      svg += `<text x="${cx0(s)}" y="${topPad - sz*0.18}" font-size="${sz*0.28}" fill="#888" text-anchor="middle" font-weight="700">×</text>`;
    } else if (f === 0) {
      svg += `<circle cx="${cx0(s)}" cy="${topPad - sz*0.2}" r="${sz*0.13}" fill="none" stroke="#888" stroke-width="1.5"/>`;
    }
  }

  // Dedos / notas
  for (let s = 0; s < nStrings; s++) {
    const f = frets[s];
    if (f <= 0) continue;
    const cx = cx0(s);
    const cy = topPad + (f - 0.5)*rh;
    const r = sz * 0.27;

    // Calcular intervalo
    const midiStr = MIDI_BASE[s];
    const midiNota = midiStr + (bf - 1 + f);
    const raizIdx = NOTAS.indexOf(notaRaiz.replace('b','').replace('sharp','#'));
    const intervIdx = ((midiNota - (raizIdx >= 0 ? raizIdx : 0)) % 12 + 12) % 12;
    const itv = ITVS[intervIdx] || '?';
    const notaNombre = NOTAS[midiNota % 12] || '?';
    const dedo = fingers[s] || '';

    let label = modo === 'intervalos' ? itv : modo === 'notas' ? notaNombre : String(dedo);
    const isTonica = intervIdx === 0;

    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${isTonica?'#557799':'white'}" stroke="${isTonica?'#335577':'#cc4444'}" stroke-width="1.5"/>`;
    svg += `<text x="${cx}" y="${cy + sz*0.09}" font-size="${label.length > 2 ? sz*0.16 : sz*0.2}" fill="${isTonica?'white':'#222'}" text-anchor="middle" font-weight="700">${label}</text>`;
  }

  svg += '</svg>';
  return svg;
}

// ─── MODAL ────────────────────────────────────────────────
function abrirModal(keyDB, suf, posIdx) {
  if (!chordDB || !chordDB[keyDB] || !chordDB[keyDB][suf]) return;
  modalAcorde = { keyDB, suf, posIdx };
  renderModal();
  document.getElementById('modal').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('open');
}

function navPos(dir) {
  if (!modalAcorde || !chordDB) return;
  const { keyDB, suf } = modalAcorde;
  const total = chordDB[keyDB][suf].length;
  modalAcorde.posIdx = (modalAcorde.posIdx + dir + total) % total;
  renderModal();
}

function setModo(m) {
  modoCirculo = m;
  document.querySelectorAll('.btn-modo').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(m.substring(0,3))));
  if (modalAcorde) renderModal();
}

function renderModal() {
  const { keyDB, suf, posIdx } = modalAcorde;
  const nota = keyDB.replace('sharp','#');
  const nombre = nota + (suf === 'major' ? '' : suf === 'minor' ? 'm' : suf);
  const poses = chordDB[keyDB][suf];
  const pos = poses[posIdx];

  document.getElementById('m-titulo').textContent = nombre;
  document.getElementById('m-formula').textContent = 'Fórmula: ' + (FORMULA_MAP[suf] || suf);
  document.getElementById('m-pos').textContent = `pos ${posIdx+1} / ${poses.length}`;
  document.getElementById('m-diagrama').innerHTML = diagramaSVG(pos, nota, suf, modoCirculo, 70);
  document.getElementById('m-desc').textContent = DESCRIPCIONES[suf] || '';

  // Estado cuerdas
  const statusLabels = (pos.frets||[]).map(f => f === -1 ? '×' : f === 0 ? '○' : '').reverse();
  document.getElementById('m-cuerdas-status').innerHTML = statusLabels.map(l => `<span style="width:12%">${l}</span>`).join('');
}

// ─── AUDIO (Web Audio API) ────────────────────────────────
let audioCtx = null;
function playAcorde() {
  if (!modalAcorde || !chordDB) return;
  const { keyDB, suf, posIdx } = modalAcorde;
  const pos = chordDB[keyDB][suf][posIdx];
  const midi = pos.midi || [];
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  midi.forEach((note, i) => {
    if (note === 0) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const freq = 440 * Math.pow(2, (note - 69) / 12);
    osc.frequency.value = freq;
    osc.type = 'triangle';
    const t = audioCtx.currentTime + i * 0.06;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
    osc.start(t); osc.stop(t + 1.8);
  });
}

// ─── BUSCADOR ─────────────────────────────────────────────
async function buscar() {
  const q = document.getElementById('inp').value.trim();
  if (!q) return;
  const st = document.getElementById('status');
  const res = document.getElementById('resultado');
  st.textContent = '⏳ Buscando...';
  res.innerHTML = '';
  try {
    const r = await fetch('/api/buscar', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q}) });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    st.textContent = '';
    renderCancion(data);
  } catch(e) {
    st.textContent = ''; res.innerHTML = `<p style="color:red;padding:20px">No se pudo cargar: ${e.message}</p>`;
  }
}

function renderCancion(d) {
  const secColor = s => {
    const t = (s||'').toLowerCase();
    if (t.includes('estrib')) return 'sec-estribillo';
    if (t.includes('puente')) return 'sec-puente';
    if (t.includes('intro')) return 'sec-intro';
    if (t.includes('outro')) return 'sec-outro';
    return 'sec-estrofa';
  };
  let html = `<div class="cancion">
    <div class="cancion-titulo">${d.titulo||''}</div>
    <div class="cancion-meta"><span>${d.artista||''}</span><span>${d.compas||'4/4'}</span><span>${d.genero||''}</span></div>`;
  for (const sec of (d.secciones||[])) {
    html += `<div class="seccion ${secColor(sec.nombre)}">
      <div class="seccion-label">${sec.nombre||''}</div>
      <div class="compases">`;
    for (const comp of (sec.compases||[])) {
      const acordes = Array.isArray(comp.acordes) ? comp.acordes : [comp.acordes||comp.acorde||''];
      const letra = comp.letra || '';
      html += `<div class="compas"><div class="compas-acorde">${acordes.join(' / ')}</div><div class="compas-letra">${letra}</div></div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  document.getElementById('resultado').innerHTML = html;
}
</script>
